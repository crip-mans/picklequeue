<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PickleQueue — Join a Session</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display:['Bebas Neue','cursive'], body:['DM Sans','sans-serif'] },
          colors: {
            pickle:{ 50:'#f0fdf0',100:'#dcfce0',200:'#bbf7c4',300:'#86ef9a',400:'#4ade68',500:'#22c544',600:'#16a336',700:'#15802d',800:'#166528',900:'#145323' },
            court:'#1a2e1a', ink:'#0d1a0d',
          },
        },
      },
    };
  </script>
  <script src="supabase.js"></script>
  <style>
    * { font-family: 'DM Sans', sans-serif; }
    .display-font { font-family: 'Bebas Neue', cursive; }

    body {
      background-color: #0d1a0d;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(34,197,68,0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(34,197,68,0.10) 0%, transparent 55%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* Court lines texture on card */
    .court-bg {
      background-image:
        linear-gradient(rgba(34,197,68,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,68,0.05) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .input-glow:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(34,197,68,0.45);
    }

    /* Code input: big mono characters */
    #session-code-input {
      font-family: 'DM Sans', monospace;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    @keyframes float-ball {
      0%,100% { transform: translateY(0px) rotate(-3deg); }
      50%      { transform: translateY(-8px) rotate(3deg); }
    }
    .ball-float { animation: float-ball 3s ease-in-out infinite; }

    @keyframes slide-up {
      from { transform: translateY(16px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .slide-up { animation: slide-up 0.5s ease forwards; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    .spinner { border:2px solid rgba(34,197,68,0.2); border-top-color:#22c544; border-radius:50%; width:18px; height:18px; animation:spin .6s linear infinite; display:inline-block; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg) } }

    /* Divider dots */
    .dot-divider::before, .dot-divider::after {
      content:''; display:inline-block; width:24px; height:1px;
      background: rgba(34,197,68,0.25); vertical-align:middle; margin:0 8px;
    }
  </style>
</head>

<body class="text-green-100">

<!-- Decorative background blobs -->
<div class="pointer-events-none fixed inset-0 overflow-hidden">
  <div class="absolute -top-32 -left-32 w-96 h-96 rounded-full bg-pickle-900/20 blur-3xl"></div>
  <div class="absolute -bottom-32 -right-32 w-96 h-96 rounded-full bg-pickle-900/15 blur-3xl"></div>
</div>

<!-- MAIN CARD -->
<div class="relative w-full max-w-sm slide-up">

  <!-- Logo + hero -->
  <div class="text-center mb-8">
    <div class="ball-float inline-block text-5xl mb-3 select-none">🏓</div>
    <h1 class="display-font text-5xl tracking-widest text-pickle-400 leading-none">PickleQueue</h1>
    <p class="text-green-600 text-sm mt-1.5">Court queue management for pickleball clubs</p>
  </div>

  <!-- Card -->
  <div class="court-bg bg-court border border-green-900/70 rounded-2xl p-6 shadow-2xl shadow-black/40">

    <h2 class="display-font text-2xl text-green-200 mb-0.5">Join a Session</h2>
    <p class="text-green-600 text-xs mb-5">Enter your club name and the session code provided by your organiser.</p>

    <!-- Club name -->
    <div class="mb-4">
      <label class="block text-xs text-green-600 uppercase tracking-wider font-semibold mb-1.5">Club Name</label>
      <input id="club-name-input" type="text" placeholder="e.g. Sunset Pickle Club" maxlength="60" autocomplete="organization"
        class="input-glow w-full bg-ink border border-green-900 rounded-xl px-4 py-3 text-green-100 text-sm placeholder-green-800 transition-all"
        onkeydown="if(event.key==='Enter') document.getElementById('session-code-input').focus()" />
    </div>

    <!-- Session code -->
    <div class="mb-5">
      <label class="block text-xs text-green-600 uppercase tracking-wider font-semibold mb-1.5">Session Code</label>
      <input id="session-code-input" type="text" placeholder="ABC-1234" maxlength="12" autocomplete="off" spellcheck="false"
        class="input-glow w-full bg-ink border border-green-900 rounded-xl px-4 py-3 text-green-100 text-sm text-center placeholder-green-800 transition-all"
        oninput="formatCodeInput(this)"
        onkeydown="if(event.key==='Enter') joinSession()" />
      <p id="code-hint" class="text-green-800 text-xs mt-1.5 text-center">Ask your club admin for the session code</p>
    </div>

    <!-- Error message -->
    <div id="join-error" class="hidden mb-4 bg-red-950/60 border border-red-900/50 rounded-xl px-4 py-3">
      <p id="join-error-text" class="text-red-400 text-sm font-medium"></p>
    </div>

    <!-- Join button -->
    <button id="join-btn" onclick="joinSession()"
      class="w-full bg-pickle-600 hover:bg-pickle-500 active:scale-[0.98] text-white font-bold py-3.5 rounded-xl text-sm transition-all">
      Enter Queue →
    </button>

    <!-- Divider -->
    <div class="my-4 text-center text-xs text-green-800 dot-divider">or</div>

    <!-- Admin link -->
    <a href="admin/index.html"
      class="block w-full text-center bg-green-950/60 hover:bg-green-950 border border-green-900/50 text-green-500 hover:text-green-400 font-medium py-2.5 rounded-xl text-xs transition-all">
      Admin Dashboard ↗
    </a>
    <a href="register.html"
      class="block w-full text-center text-green-800 hover:text-green-600 font-medium py-1.5 text-xs transition-all">
      New club? Create an account →
    </a>
  </div>

  <!-- Footer -->
  <p class="text-green-900 text-xs text-center mt-5">
    PickleQueue &middot; Fair queue management for everyone
  </p>
</div>

<script>
// ─── LANDING PAGE SCRIPT ────────────────────────────────────
// On load: if player already has a valid stored session, skip straight to queue.
(async function checkExistingSession() {
  const stored = getStoredSession();
  if (!stored) return;

  // Silently verify the code is still active before auto-redirecting
  try {
    const result = await validateSessionCode(stored.code);
    if (result.valid) {
      window.location.href = 'index-user.html';
    } else {
      clearStoredSession();
    }
  } catch (e) {
    // Network error — let them re-enter manually
    clearStoredSession();
  }
})();

// ── Format the code input as they type: uppercase, strip non-alphanum ──
function formatCodeInput(input) {
  let raw = input.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
  // Auto-insert dash after 3 chars: ABC1234 → ABC-1234
  if (raw.length > 3) raw = raw.slice(0, 3) + '-' + raw.slice(3, 7);
  else raw = raw.slice(0, 3);
  input.value = raw;
}

// ── Main join handler ─────────────────────────────────────
async function joinSession() {
  const clubName = document.getElementById('club-name-input').value.trim();
  const rawCode  = document.getElementById('session-code-input').value.trim();

  clearError();

  if (!clubName) { showError('Please enter your club name.'); shakeInput('club-name-input'); return; }
  if (!rawCode)  { showError('Please enter the session code.'); shakeInput('session-code-input'); return; }
  if (rawCode.length < 3) { showError('Session code is too short.'); shakeInput('session-code-input'); return; }

  setLoading(true);

  try {
    const result = await validateSessionCode(rawCode);

    if (!result.valid) {
      setLoading(false);
      showError(result.reason || 'Invalid or expired session code. Check with your admin.');
      shakeInput('session-code-input');
      return;
    }

    // Success — store session and redirect
    storeSession({ clubName, code: rawCode, sessionId: result.sessionId, sessionLabel: result.label, clubId: result.clubId });
    window.location.href = 'index-user.html';

  } catch (e) {
    setLoading(false);
    showError('Connection error. Check your internet and try again.');
    console.error(e);
  }
}

// ── UI helpers ───────────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('join-btn');
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span> Checking...'
    : 'Enter Queue →';
}

function showError(msg) {
  const el   = document.getElementById('join-error');
  const text = document.getElementById('join-error-text');
  text.textContent = msg;
  el.classList.remove('hidden');
}
function clearError() {
  document.getElementById('join-error').classList.add('hidden');
}

function shakeInput(id) {
  const el = document.getElementById(id);
  el.classList.remove('shake');
  void el.offsetWidth; // reflow to restart animation
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 500);
  el.focus();
}
</script>
</body>
</html>
